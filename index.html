<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | James Meguiso</title>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #020408;
        }

        body, html {
            height: 100%;
            margin: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Scanning Background Effect */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 5;
            background: linear-gradient(0deg, rgba(0, 242, 255, 0) 0%, rgba(0, 242, 255, 0.1) 50%, rgba(0, 242, 255, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .portal-box {
            text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 60px;
            background: rgba(10, 15, 25, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        h2 {
            letter-spacing: 5px;
            color: var(--neon);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            margin-bottom: 30px;
            min-height: 1.2em;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 35px;
            border: 1px solid var(--neon);
            background: transparent;
            color: var(--neon);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            outline: none;
        }

        .btn:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 20px var(--neon);
        }

        #login-form {
            display: none;
            margin-top: 30px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            padding-top: 20px;
        }

        input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: var(--neon);
            padding: 10px;
            margin-bottom: 10px;
            width: 80%;
            outline: none;
        }
    </style>
</head>
<body>

<div class="scanline"></div>

<div class="portal-box">
    <div style="font-size: 0.7rem; color: var(--neon); opacity: 0.6; margin-bottom: 10px;">ID: MEGUISO_J_05142026</div>
    <h2 id="title"></h2>
    <p style="color: #8892b0; font-size: 0.8rem;">CHOOSE TO PROCEED</p>

    <div class="btn-container" id="main-btns">
        <button class="btn" onclick="handleAction(proceedToView)">View</button>
        <button class="btn" onclick="handleAction(showLogin)">Edit</button>
    </div>

    <div id="login-form">
        <p style="font-size: 0.7rem; color: #ff4d4d;">UNAUTHORIZED ACCESS</p>
        <input type="text" placeholder="ADMIN_USER">
        <input type="password" placeholder="SECURE_PHRASE">
        <div class="btn-container">
            <button class="btn" style="font-size: 0.7rem;" onclick="handleAction(() => alert('Access Denied: Invalid Credentials'))">Login</button>
            <button class="btn" style="font-size: 0.7rem; border-color: #ff4d4d; color: #ff4d4d;" onclick="handleAction(hideLogin)">Cancel</button>
        </div>
    </div>
</div>

<script>
    // Audio Context Setup
    let audioCtx;

    function playPressSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        // Cyber-digital click sound
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // Helper to play sound and then execute the button function
    function handleAction(callback) {
        playPressSound();
        // Small delay to ensure sound starts before page transitions or alerts
        setTimeout(callback, 50);
    }

    // Typewriter effect
    const titleText = "SYSTEM ACCESS";
    let i = 0;
    function typeWriter() {
        if (i < titleText.length) {
            document.getElementById("title").innerHTML += titleText.charAt(i);
            i++;
            setTimeout(typeWriter, 100);
        }
    }
    window.onload = typeWriter;

    // Logic Functions
    function proceedToView() {
        window.location.href = 'portfolio.html'; 
    }

    function showLogin() {
        document.getElementById('main-btns').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
    }

    function hideLogin() {
        document.getElementById('main-btns').style.display = 'flex';
        document.getElementById('login-form').style.display = 'none';
    }
</script>

</body>
</html>
